arrival:
  - "A narrowband signal cuts through the usual traffic. 'I can move your restricted goods. Better rates. Questions later.'"
  - "A contact you don't remember adding appears on your channel. 'Your inventory matches a certain unregistered demand.'"
  - "The PB3K flags an unsolicited transmission. 'Your shed contains items that certain parties are eager to acquire. Discreetly.'"
  - "A text fragment scrolls across the display. Seven words: 'I buy what they won't. Best price. No questions.'"

match:
  - "The broker nods once. 'Acceptable. Credits are en route.' The transfer clears without a name attached."
  - "'Clean transaction.' The funds appear in your ledger — no signature, no receipt, no record."
  - "A confirmation hash appears, then dissolves. 'Done. Your cut has been forwarded through three intermediaries.'"
  - "The broker's icon goes dark. A deposit notification arrives three seconds later."

seizure:
  - "The channel goes dead mid-transmission. Your inventory log shows the item as 'LOST — SIGNAL INTERRUPTED.' No further contact."
  - "An automated message plays: 'Shipment intercepted by regulatory patrol. All assets forfeit. Do not attempt to trace.'"
  - "The broker's last packet reads: 'They were waiting for us. I'm burning the route. Do not expect recovery.' Then silence."
  - "Your tracking node reports the item left your custody but never reached its destination. The trail ends at a dead transponder."

withdraw:
  - "'Your caution is noted. The offer stands until my next rotation. Do not take too long.'"
  - "The channel remains open but idle. The broker is patient. Your item stays in the shed."
  - "'As you wish. My buyers are not known for their patience, but I will hold the quote.'"
