  intro: A frost-rimed module hums quietly. The air around it is noticeably colder.
  signals:
    stable:
      - Frost feathers across the casing but melts at your touch.
      - The module emits a steady, cold hum. Your breath fogs.
      - A label reads "PERISHABLE" in a language you almost recognize.
    strained:
      - Condensation streams down the sides. The hum wavers in pitch.
      - The casing is sweating. Pools of cold liquid gather beneath it.
      - Frost spreads rapidly, then retreats, then spreads again.
    unstable:
      - The module rattles violently. A deep, guttural groan echoes from inside.
      - Ice crystals form on nearby stones. Your fingers go numb at arm's length.
      - The hum becomes a grinding screech. The casing is fracturing.
  collapse:
    - The module shatters into frozen fragments that evaporate into a bitter mist.
    - An explosion of ice and metallic shards. Nothing remains but frost.

