  intro: A sealed cylinder of murky fluid hums with barely contained pressure.
  signals:
    stable:
      - The fluid inside glows faintly, swirling in slow currents.
      - A rhythmic pulsing echoes through the glass surface.
      - Warmth radiates from the cylinder in steady waves.
    strained:
      - The fluid froths and churns, pressure building against the seals.
      - Hairline cracks spread across the glass. Drops of moisture bead on the surface.
      - A low, wet thrumming vibrates through your hands.
    unstable:
      - The cylinder bulges outward. The fluid inside is boiling.
      - Vapors hiss from micro-fractures. The seal groans.
      - The receiver pulses erratically — the rhythm is breaking.
  collapse:
