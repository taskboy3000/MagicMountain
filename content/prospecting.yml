    fading_multiplier: 0.40
    settling_day: 2
    fading_day: 5
  intro: A dark lens in a brass casing. When you look through it, the mountain looks different.
  signals:
    stable:
      - The lens shows faint afterimages of things that aren't there.
      - Light bends oddly around the lens. Shadows move independently.
      - Through it, your own hand appears translucent.
    strained:
      - The afterimages persist longer, matching your movements with a delay.
      - The lens grows warm. Images from other places flicker across its surface.
      - Reflections show you standing in a room you've never seen.
    unstable:
      - The lens pulses with colors that don't exist in nature.
      - Winged shapes flit at the edge of your vision, visible only through the lens.
      - The brass casing warps as if the lens is reshaping reality around it.
  collapse:
    - The lens cracks, releasing a silent flash. For a moment, you see every possible past.
    - The lens dims and goes dark. Whatever it showed is lost forever.

