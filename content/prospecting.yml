- id: thermal_box_001
  behaviors: [thermal, power]
  weight: 10
  base_value: 5
  starting_instability: 0
  max_instability: 14
  instability_growth_min: 1
  instability_growth_max: 2
  base_gain_min: 3
  base_gain_max: 5
  can_evolve: true
  evolution_threshold: 0.25
  evolution_chance: 0.04
  evolution_instability_spike: 2
  breakthrough_multiplier_min: 1.5
  breakthrough_multiplier_max: 2.0
  state_thresholds:
    stable: 0.35
    strained: 0.70
  decay_modifiers:
    fresh_multiplier: 1.0
    settling_multiplier: 0.75
    fading_multiplier: 0.40
    settling_day: 2
    fading_day: 5
  intro: The box is warm to the touch. A faint ticking comes from inside.
  signals:
    stable:
      - A comfortable warmth radiates from the casing.
      - Heat pulses steadily within the box.
      - The surface is smooth and pleasantly warm.
    strained:
      - The box grows uncomfortably hot against your gloves.
      - The casing flexes slightly, releasing a puff of steam.
      - A low vibration runs through your palms.
    unstable:
      - The metal creaks audibly. Heat shimmers in the air around it.
      - A high-pitched whine builds inside the box.
      - Rivets along the seam begin to glow a dull red.
  collapse:
    - The box splits open with a sharp hiss. Whatever was inside evaporates instantly.
    - It cracks down the middle and goes cold. A wisp of tarnished smoke rises.

- id: void_core_001
  behaviors: [instability, field]
  weight: 8
  base_value: 6
  starting_instability: 0
  max_instability: 16
  instability_growth_min: 1
  instability_growth_max: 2
  base_gain_min: 3
  base_gain_max: 6
  can_evolve: true
  evolution_threshold: 0.20
  evolution_chance: 0.04
  evolution_instability_spike: 2
  breakthrough_multiplier_min: 1.5
  breakthrough_multiplier_max: 2.5
  state_thresholds:
    stable: 0.30
    strained: 0.65
  decay_modifiers:
    fresh_multiplier: 1.0
    settling_multiplier: 0.75
    fading_multiplier: 0.40
    settling_day: 2
    fading_day: 5
  intro: A dark shard pulses with a low, rhythmic vibration, like a distant heartbeat.
  signals:
    stable:
      - The shard hums quietly in your grip.
      - A faint tremor travels up your arm with each pulse.
      - The surface is cool, but the air around it shimmers.
    strained:
      - The pulsing quickens. The shard feels heavier than it should.
      - Tiny fractures race across the surface, then heal.
      - A smell of ozone and hot metal fills the air.
    unstable:
      - The shard screams silently, a pressure behind your eyes.
      - Gravity warps around it — small stones rise from the ground.
      - The rhythm is frantic now. You feel it in your teeth.
  collapse:
    - The shard detonates with a muted thump, leaving a crater of glassy sand.
    - It folds in on itself, vanishing with a crack of displaced air.

- id: crystal_chime_001
  behaviors: [signal, field]
  weight: 5
  base_value: 8
  starting_instability: 0
  max_instability: 10
  instability_growth_min: 1
  instability_growth_max: 3
  base_gain_min: 4
  base_gain_max: 8
  can_evolve: true
  evolution_threshold: 0.40
  evolution_chance: 0.07
  evolution_instability_spike: 3
  breakthrough_multiplier_min: 2.0
  breakthrough_multiplier_max: 3.0
  state_thresholds:
    stable: 0.30
    strained: 0.60
  decay_modifiers:
    fresh_multiplier: 1.0
    settling_multiplier: 0.75
    fading_multiplier: 0.40
    settling_day: 2
    fading_day: 5
  intro: A slender crystal rod hums with an almost musical resonance.
  signals:
    stable:
      - Soft chimes ring from the crystal when touched.
      - The rod vibrates gently in your hand.
      - A faint glow pulses deep within the lattice.
    strained:
      - The chime grows louder, dissonant at the edges.
      - Cracks spider across the crystal surface like frost.
      - The rod begins to emit a low-frequency hum you feel in your teeth.
    unstable:
      - The chime is now a continuous, piercing tone.
      - Light fractures through the crystal in unnatural colors.
      - The rod moves on its own, twisting toward the mountain.
  collapse:
    - The crystal shatters into a thousand splinters that dissolve into light.
    - A harmonic scream echoes and fades. Your hands are empty.
