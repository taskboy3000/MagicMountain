entries:
  - id: faction_syndicate
    title: "SYND.8TE"
    subtitle: "The Syndicate"
    icon: icon_syndicate.svg
    body:
      - "B.L.O.T."
      - "Commercial reseller. Volume buyer. They move product — don't care what it is as long as the margin works."
      - "Base multiplier favors the seller but saturation builds fast. Spread the wealth."
      - ""
      - "KNOWN INTERESTS: thermal / storage / food_processing / power"
      - ""
      - "NEGOTIATION GUIDANCE:"
      - "Best rates on bulk-matched items. Single-item mismatch hurts more with Syndicate than other factions."
      - "They track trait saturation aggressively — diversify what you sell them."
      - "Counter-offers are worth considering; they have room to move."
  - id: faction_libremount
    title: "LBR_MT.01"
    subtitle: "LibreMount"
    icon: icon_libremount.svg
    body:
      - "B.L.O.T."
      - "Decentralized survivalist collective. They buy practical infrastructure, not curios."
      - "Tight budgets but steady demand. Low base multiplier, high daily appetite — they're always buying something."
      - ""
      - "KNOWN INTERESTS: thermal / water / sanitation / medical_response / power"
      - ""
      - "NEGOTIATION GUIDANCE:"
      - "Mismatches are tolerated well if you have nothing better. They need *something*."
      - "Don't waste counter-offer energy — their soft budgets are low."
      - "High-volume, low-margin strategy: sell them frequently, not lucratively."
  - id: faction_faculty
    title: "FAC.LTY1"
    subtitle: "The Faculty"
    icon: icon_faculty.svg
    body:
      - "B.L.O.T."
      - "Academic order. Procurement driven by archive gaps, not resale value."
      - "Interest patterns are unpredictable; pricing is consistent. They never negotiate."
      - ""
      - "KNOWN INTERESTS: signal-type / revelation-class / field-manipulation / medical_response"
      - ""
      - "NEGOTIATION GUIDANCE:"
      - "No haggling, no counters, no settles. Their offer is final."
      - "Evolved artifacts get a premium. Your selling skill does not budge their price."
      - "Offer items with signal or revelation traits for best outcome."
  - id: faction_purifiers
    title: "PURIF.RS"
    subtitle: "The Purifiers"
    icon: icon_purifiers.svg
    body:
      - "B.L.O.T."
      - "Hazard-control collective. They buy volatile materiel and pay for the privilege."
      - "Payment scales with instability index. Evolved items command maximum rate."
      - ""
      - "KNOWN INTERESTS: force-type / instability-class / medical_response"
      - ""
      - "NEGOTIATION GUIDANCE:"
      - "Higher irritation tolerance than standard. Still finite — don't push it."
      - "Avoid offering settled/faded inventory. They want active risk."
      - "Premium for unstable and dangerous items."
  - id: faction_revelationists
    title: "RVL_IST.1"
    subtitle: "The Revelationists"
    icon: icon_revelationists.svg
    body:
      - "B.L.O.T."
      - "Esoteric truth-seekers. They believe the mountain is a source of transcendent knowledge."
      - "Modest budgets, passionate buyers. They pay well for items that speak — poorly for everything else."
      - ""
      - "KNOWN INTERESTS: revelation / signal / field / transformation"
      - ""
      - "NEGOTIATION GUIDANCE:"
      - "Respond poorly to aggression. Keep irritation low."
      - "Signal-emitting and revelation-class items are their peak interest."
      - "Do not bother offering mismatched items. They won't settle."
