entries:
  - id: faction_syndicate
    title: "SYND.8TE"
    subtitle: "Syndicate"
    icon: icon_syndicate.svg
    body:
      - "The Syndicate is a far-future corporate entity specializing in interstellar resource acquisition and market manipulation."
      - "Their representatives are known for aggressive negotiation tactics and a willingness to pay premium prices for rare artifacts."
      - "OPERATIONAL NOTE: The Syndicate maintains standing buy orders for thermal, storage, and food processing technologies. Priority is given to bulk acquisitions and rare finds."
  - id: faction_libremount
    title: "LBR_MT.01"
    subtitle: "LibreMount"
    icon: icon_libremount.svg
    body:
      - "LibreMount is a decentralized survivalist collective operating out of the northern reaches. They prioritize practical equipment and subsistence infrastructure."
      - "They are cautious buyers — less interested in profit than in securing functional technology for their settlements."
      - "OPERATIONAL NOTE: LibreMount procurers respond well to offers of thermal, water, and medical equipment. Flashy artifacts hold little appeal."
  - id: faction_faculty
    title: "FAC.LTY1"
    subtitle: "The Faculty"
    icon: icon_faculty.svg
    body:
      - "The Faculty is an academic order dedicated to cataloguing and studying the remnants of the old world. Their archives are legendary."
      - "They pay fair market rates and rarely haggle, but their interest is highly selective — they want artifacts that tell a story."
      - "OPERATIONAL NOTE: The Faculty shows particular interest in signal-emitting, revelation-class, and field-manipulation artifacts."
  - id: faction_purifiers
    title: "PURIF.RS"
    subtitle: "The Purifiers"
    icon: icon_purifiers.svg
    body:
      - "The Purifiers are a zealous reform movement seeking to contain and neutralize the dangers left behind by the old world."
      - "They pay a premium for dangerous or unstable artifacts. Their procurement officers are trained to handle volatile materials."
      - "OPERATIONAL NOTE: Force-type and instability-class artifacts command the highest prices from Purifier buyers. They will tolerate more irritation than other factions."
  - id: faction_revelationists
    title: "RVL_IST.1"
    subtitle: "The Revelationists"
    icon: icon_revelationists.svg
    body:
      - "The Revelationists are a loose network of truth seekers who believe the mountain is a source of transcendent knowledge."
      - "They are less interested in monetary value than in the esoteric properties of artifacts. Their budgets are modest but their passion is genuine."
      - "OPERATIONAL NOTE: Revelationists are drawn to artifacts with signal, revelation, or transformation traits. They respond poorly to aggressive negotiation."
